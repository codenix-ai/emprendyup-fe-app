name: ✅ AI Validator

on:
  pull_request:
    types: [closed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      jira_key:
        description: 'Clave del issue Jira a validar (ej: EMPR-42)'
        required: true
        type: string
      module:
        description: 'Módulo a re-testear'
        required: false
        default: 'all'
        type: choice
        options: [all, store, restaurant, service, dashboard]

jobs:
  validate:
    name: ✅ Post-fix Validation
    runs-on: ubuntu-latest
    # Correr si: PR mergeado con label auto-fix  ─ O ─ dispatch manual
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'auto-fix'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Create reports directory
        run: mkdir -p reports

      - name: Start test environment
        run: |
          docker-compose -f docker-compose.test.yml up -d
          for i in {1..20}; do
            curl -sf "${{ secrets.TEST_BASE_URL }}/api/health" && break
            sleep 5
          done

      - name: Extract Jira key from PR title
        id: jira
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "key=${{ github.event.inputs.jira_key }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.inputs.module }}" >> $GITHUB_OUTPUT
          else
            PR_TITLE="${{ github.event.pull_request.title }}"
            KEY=$(echo "$PR_TITLE" | grep -oP '[A-Z]+-\d+' | head -1)
            echo "key=$KEY" >> $GITHUB_OUTPUT
            echo "module=all" >> $GITHUB_OUTPUT
          fi

      - name: Build fixed-issues manifest
        run: |
          cat > reports/fixed-issues.json << EOF
          [
            {
              "key": "${{ steps.jira.outputs.key }}",
              "summary": "${{ github.event.pull_request.title || github.event.inputs.jira_key }}",
              "component": "${{ steps.jira.outputs.module }}",
              "affectedFile": "",
              "status": "In Review",
              "fixBranch": "${{ github.event.pull_request.head.ref || 'main' }}",
              "layer": "auto-detected"
            }
          ]
          EOF

      - name: Re-run E2E tests for affected module
        env:
          BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          MODULE="${{ steps.jira.outputs.module }}"
          if [ "$MODULE" = "all" ] || [ -z "$MODULE" ]; then
            npx playwright test agents/qa-runner/scenarios/ \
              --reporter=json --retries=1 --timeout=30000 || true
          else
            npx playwright test agents/qa-runner/scenarios/${MODULE}.spec.ts \
              --reporter=json --retries=1 --timeout=30000 || true
          fi
          cp test-results/.last-run.json reports/playwright.json 2>/dev/null || true

      - name: Run Validator Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_MCP_URL: ${{ secrets.JIRA_MCP_URL }}
          JIRA_PROJECT_KEY: EMPR
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BASE_URL: ${{ secrets.TEST_BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: npx ts-node agents/validator/index.ts

      - name: Post validation result to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const key = '${{ steps.jira.outputs.key }}';
            let status = '✅ Validación exitosa — issue cerrado en Jira.';
            if (fs.existsSync('reports/validator-result.json')) {
              const r = JSON.parse(fs.readFileSync('reports/validator-result.json','utf-8'));
              status = r.passed
                ? '✅ Validación exitosa — ' + key + ' cerrado en Jira.'
                : '❌ Validación fallida — ' + key + ' reabierto en Jira. Requiere revisión.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ' + status + '\n\n*Generado por AI Validator Agent — emprendy.ai*'
            });

      - name: Teardown
        if: always()
        run: docker-compose -f docker-compose.test.yml down || true

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validator-report-${{ github.run_number }}
          path: reports/
          retention-days: 14
